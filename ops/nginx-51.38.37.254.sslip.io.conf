# AKS Executor — vhost 51.38.37.254.sslip.io
# / keeps the existing placeholder site; /executor/ is the admin page,
# basic-auth protected, proxied to the loopback-only Python app.
# certbot --nginx rewrites this file for TLS (listen 443 + redirect).
server {
  listen 80;
  listen [::]:80;
  server_name 51.38.37.254.sslip.io;

  root /var/www/51.38.37.254.sslip.io/html;
  index index.html;

  location / { try_files $uri $uri/ /index.html; }

  location = /executor { return 301 /executor/; }

  location /executor/ {
    auth_basic "AKS Executor";
    auth_basic_user_file /etc/nginx/.htpasswd_executor;

    proxy_pass http://127.0.0.1:8650/;   # trailing slash strips /executor/
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    # POST /api/invariants/check can take a while (probes + retries)
    proxy_read_timeout 200s;
    client_max_body_size 1m;
  }
}
